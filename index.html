<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mavhi Social</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #bb86fc; --bg: #121212; --card: #1e1e1e; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
        }
        .container { width: 100%; max-width: 500px; }
        .hidden { display: none !important; }
        
        /* СТИЛІ АВАТАРА */
        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #333;
            margin-right: 12px;
            border: 2px solid var(--accent);
        }

        /* КАРТКА ПОСТА */
        .post { 
            background: var(--card); 
            padding: 15px; 
            border-radius: 15px; 
            border: 1px solid #333; 
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }
        .post-content { flex: 1; }
        .user { font-weight: bold; color: var(--accent); font-size: 14px; margin-bottom: 4px; }
        .text { font-size: 16px; line-height: 1.4; color: #e0e0e0; }

        /* ФОРМИ */
        .create-post, .auth-box { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 25px; 
            border: 1px solid #444; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input, textarea { 
            width: 100%; background: #252525; border: 1px solid #333; 
            color: white; padding: 12px; margin-bottom: 10px; 
            border-radius: 10px; box-sizing: border-box; outline: none;
        }
        button { 
            background: var(--accent); border: none; padding: 12px 24px; 
            border-radius: 25px; font-weight: bold; cursor: pointer; color: #121212;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.05); opacity: 0.9; }
    </style>
</head>
<body>

    <div id="auth-container" class="container">
        <h2 style="text-align:center; color: var(--accent);">Mavhi</h2>
        <div class="auth-box">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button style="flex: 1;" onclick="handleAuth('login')">Увійти</button>
                <button style="flex: 1; background: #333; color: white;" onclick="handleAuth('signup')">Реєстрація</button>
            </div>
        </div>
    </div>

    <div id="main-content" class="container hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0; color: var(--accent);">Mavhi Social</h2>
            <button onclick="logout()" style="padding: 5px 15px; font-size: 12px; background: #cf6679;">Вийти</button>
        </div>
        
        <div class="create-post">
            <textarea id="postInput" placeholder="Що у вас нового?" rows="3"></textarea>
            <div style="text-align: right;">
                <button onclick="publishPost()">Опублікувати</button>
            </div>
        </div>

        <div id="posts-container"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://dxfebjjhnxjzzwigxxka.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4ZmViampobnhqenp3aWd4eGthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NjY5NjYsImV4cCI6MjA5MjQ0Mjk2Nn0.RI7KurhtW93Mu8qbe_d9TrH-NuJoM_hVZ2oSCIXaxSU';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUser = null;

        // ГЕНЕРАТОР АВАТАРОК (DiceBear)
        function getAvatar(seed) {
            return `https://api.dicebear.com/7.x/bottts/svg?seed=${seed}`;
        }

        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!email || !password) return alert("Заповни поля!");

            const { data, error } = (type === 'signup') 
                ? await supabaseClient.auth.signUp({ email, password })
                : await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) alert(error.message);
            else if (data.user) { currentUser = data.user; showApp(); }
        }

        function showApp() {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            loadPosts();
        }

        async function logout() { await supabaseClient.auth.signOut(); location.reload(); }

        async function loadPosts() {
            const { data: posts, error } = await supabaseClient
                .from('posts').select('*').order('created_at', { ascending: false });

            const container = document.getElementById('posts-container');
            container.innerHTML = ''; 

            posts.forEach(post => {
                const userSeed = post.username || 'anon';
                const postHTML = `
                    <div class="post">
                        <img class="avatar" src="${getAvatar(userSeed)}" alt="ava">
                        <div class="post-content">
                            <div class="user">@${userSeed}</div>
                            <div class="text">${post.content}</div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', postHTML);
            });
        }

        async function publishPost() {
            const input = document.getElementById('postInput');
            if (!input.value.trim()) return;

            const userName = currentUser.email.split('@')[0];
            const { error } = await supabaseClient
                .from('posts').insert([{ username: userName, content: input.value }]);

            if (error) alert("Помилка бази!");
            else { input.value = ""; loadPosts(); }
        }

        async function checkSession() {
            const { data } = await supabaseClient.auth.getSession();
            if (data.session) { currentUser = data.session.user; showApp(); }
        }
        checkSession();
    </script>
</body>
</html>
